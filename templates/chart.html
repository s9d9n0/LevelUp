{% extends "base.html" %}
{% block content %}

<div class="chart-header">
    <a href="/" class="back-link">← Retour</a>
    <h2>{{ ticker }}</h2>
</div>

<div class="chart-wrapper">
    <div id="mainChart" style="height: 600px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<script>
const candles = {{ candles | tojson }};
const rsiData = {{ rsi_data | tojson }};

const dates = candles.map(c => c.x);
const ohlc  = candles.map(c => [c.o, c.c, c.l, c.h]);
const rsi   = rsiData.map(r => r.y);

const chart = echarts.init(document.getElementById("mainChart"), "dark");

chart.setOption({
    backgroundColor: "#1a1d27",
    tooltip: {
        trigger: "axis",
        axisPointer: { type: "cross" },
    },
    axisPointer: { link: [{ xAxisIndex: "all" }] },
    dataZoom: [
        { type: "inside", xAxisIndex: [0, 1], start: 0, end: 100 },
        {
            type: "slider", xAxisIndex: [0, 1],
            bottom: 5, height: 20,
            borderColor: "#2e3244",
            fillerColor: "rgba(88, 166, 255, 0.1)",
            textStyle: { color: "#8b949e" },
        }
    ],
    grid: [
        { left: "5%", right: "3%", top: "3%", height: "58%" },
        { left: "5%", right: "3%", top: "68%", height: "18%" },
    ],
    xAxis: [
        {
            type: "category", data: dates, gridIndex: 0,
            axisLine: { lineStyle: { color: "#2e3244" } },
            axisLabel: { show: false },
            splitLine: { show: false },
        },
        {
            type: "category", data: dates, gridIndex: 1,
            axisLine: { lineStyle: { color: "#2e3244" } },
            axisLabel: { color: "#8b949e", rotate: 30 },
            splitLine: { show: false },
        }
    ],
    yAxis: [
        {
            type: "value", scale: true, gridIndex: 0,
            axisLine: { lineStyle: { color: "#2e3244" } },
            axisLabel: { color: "#8b949e" },
            splitLine: { lineStyle: { color: "#2e3244" } },
        },
        {
            type: "value", min: 0, max: 100, gridIndex: 1,
            axisLine: { lineStyle: { color: "#2e3244" } },
            axisLabel: { color: "#8b949e" },
            splitLine: { lineStyle: { color: "#2e3244" } },
        }
    ],
    series: [
        {
            type: "candlestick",
            xAxisIndex: 0, yAxisIndex: 0,
            data: ohlc,
            itemStyle: {
                color: "#2ea043",
                color0: "#f85149",
                borderColor: "#2ea043",
                borderColor0: "#f85149",
            }
        },
        {
            name: "RSI",
            type: "line",
            xAxisIndex: 1, yAxisIndex: 1,
            data: rsi,
            smooth: true,
            symbol: "none",
            lineStyle: { color: "#58a6ff", width: 2 },
            markLine: {
                silent: true,
                lineStyle: { color: "#8b949e", type: "dashed" },
                data: [
                    { yAxis: 30, label: { formatter: "30", color: "#8b949e" } },
                    { yAxis: 70, label: { formatter: "70", color: "#8b949e" } },
                ]
            }
        }
    ]
});

window.addEventListener("resize", () => chart.resize());
</script>

{% endblock %}

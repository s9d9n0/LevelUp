{% if results %}
<div class="results-wrapper">
    <table>
        <thead>
            <tr>
            <th>Ticker</th>
            <th>RSI</th>
            <th>Clôture</th>
            <th>MACD</th>
            <th>EMA 20</th>
            </tr>
        </thead>
        <tbody>
            {% for r in results %}
            <tr>
            <td><a href="/chart/{{ r.ticker }}">{{ r.ticker }}</a></td>
            <td>{{ r.rsi }}</td>
            <td>{{ r.close }}</td>
            <td>{{ r.macd }}</td>
            <td>{{ r.ema20 }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
    <p>Aucun titre ne correspond aux critères.</p>
{% endif %}
